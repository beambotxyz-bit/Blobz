		<style>
			#adsBottom, #canvas {
				left: 0;
				right: 0;
				bottom: 0;
				position: absolute
			}

			#adsBottom, #canvas, #chat_textbox, #helloDialog {
				position: absolute;
			}

			html {
				width: 100%;
				height: 100%;
				min-height: 100%;
				overflow: hidden;
				touch-action: none;
				overscroll-behavior: none;
				-webkit-text-size-adjust: 100%;
			}

			.ui-dialog, body {
				overflow: hidden
			}

			body {
				padding: 0;
				margin: 0;
				width: var(--blobz-game-width, 100vw);
				height: var(--blobz-game-height, 100vh);
				min-height: var(--blobz-game-height, 100vh);
				position: fixed;
				inset: 0;
				touch-action: none;
				-ms-touch-action: none;
				overscroll-behavior: none;
				background: #000;
				user-select: none;
				-webkit-user-select: none;
				-webkit-tap-highlight-color: transparent;
			}

			#canvas {
				top: 0;
				width: var(--blobz-game-width, 100vw);
				height: var(--blobz-game-height, 100vh);
				position: fixed;
				display: block;
				touch-action: none;
				-ms-touch-action: none;
				user-select: none;
				-webkit-user-select: none;
			}

			.checkbox label {
				margin-right: 10px
			}

			form {
				margin-bottom: 0
			}

			.btn-play, .btn-settings, .btn-spectate {
				display: block;
				height: 35px
			}

			.btn-play {
				width: 85%;
				float: left
			}

			.btn-settings {
				width: 13%;
				float: right
			}

			.btn-spectate {
				display: block;
				float: right
			}

			.btn-play, .btn-settings, .btn-spectate {
				display: block;
				height: 35px;
			}

			.btn-play {
				width: 55%;
				margin-right: 10px;
				margin-bottom: 10px;
			}

			.btn-settings {
				width: 13%;
			}

			#helloDialog {
				width: 350px;
				background-color: #FFFFFF;
				border-radius: 15px;
				padding: 5px 15px 5px 15px;
				position: absolute;
				top: 50%;
				left: 50%;
				-webkit-transform: translate(-50%, -50%);
				-ms-transform: translate(-50%, -50%);
				transform: translate(-50%, -50%);
			}

			#chat_textbox {
				-webkit-transition: all .5s ease-in-out;
				-moz-transition: all .5s ease-in-out;
				-o-transition: all .5s ease-in-out;
				transition: all .5s ease-in-out;
				z-index: 1;
				bottom: 10px;
				background: rgba(0, 0, 0, .2);
				border: 0;
				outline: 0;
				color: #FFF;
				height: 30px;
				text-indent: 12px;
				left: 10px;
				width: 300px
			}

			#chat_textbox:focus {
				background: rgba(0, 0, 0, .5)
			}

			#lb-hud {
				position: absolute;
				top: max(10px, env(safe-area-inset-top));
				left: max(10px, env(safe-area-inset-left));
				z-index: 150;
				width: 44px;
				min-height: 44px;
				font-family: "Outfit", "Segoe UI", Tahoma, sans-serif;
			}

			#lb-hud.is-hidden {
				display: none;
			}

			#game-stats-strip {
				position: absolute;
				top: max(10px, env(safe-area-inset-top));
				left: 50%;
				z-index: 145;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 9px;
				max-width: calc(100vw - 132px);
				padding: 6px 10px;
				border: 1px solid rgba(255,255,255,0.07);
				border-radius: 999px;
				background: rgba(4, 5, 8, 0.62);
				box-shadow: 0 10px 28px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.05);
				color: rgba(255,255,255,0.72);
				font: 500 10px/1 "Outfit", "Segoe UI", Tahoma, sans-serif;
				letter-spacing: .04em;
				text-transform: uppercase;
				transform: translateX(-50%);
				pointer-events: none;
				backdrop-filter: blur(12px);
				-webkit-backdrop-filter: blur(12px);
				white-space: nowrap;
				transition: opacity .16s ease, transform .16s ease;
			}

			#game-stats-strip b {
				color: #fff;
				font-weight: 800;
			}

			#lb-hud.is-open {
				width: min(198px, calc(100vw - 20px));
			}

			#lb-toggle {
				position: relative;
				z-index: 1;
				width: 44px;
				height: 44px;
				padding: 0;
				border: 1px solid rgba(255, 255, 255, 0.08);
				border-radius: 13px;
				background: rgba(10, 10, 15, 0.74);
				color: #fff;
				cursor: pointer;
				outline: none;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				backdrop-filter: blur(18px);
				-webkit-backdrop-filter: blur(18px);
				box-shadow: 0 12px 28px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255,255,255,0.08);
				transition: background-color .18s ease, border-color .18s ease, transform .18s ease, opacity .16s ease;
			}

			#lb-toggle:hover,
			#lb-toggle:focus-visible,
			#lb-toggle.is-active {
				background: rgba(18, 18, 25, 0.92);
				border-color: rgba(0, 229, 255, 0.34);
				transform: translateY(-1px);
			}

			.lb-trigger-icon {
				font-size: 22px;
				line-height: 1;
				filter: drop-shadow(0 0 8px rgba(255, 210, 70, .4));
			}

			#lb-hud.is-open #lb-toggle {
				display: none;
				opacity: 0;
				pointer-events: none;
				transform: scale(.92);
			}

			#lb-panel {
				position: absolute;
				top: 0;
				left: 0;
				display: none;
				width: min(198px, calc(100vw - 20px));
				max-height: min(60vh, 262px);
				overflow: hidden;
				border: 1px solid rgba(255, 255, 255, 0.07);
				border-radius: 15px;
				background: rgba(5, 5, 8, 0.76);
				backdrop-filter: blur(18px) saturate(115%);
				-webkit-backdrop-filter: blur(18px) saturate(115%);
				box-shadow: 0 18px 42px rgba(0, 0, 0, 0.48), inset 0 1px 0 rgba(255,255,255,.06);
				color: #f7f8fb;
			}

			#lb-panel.is-open {
				display: block;
			}

			.lb-panel-head {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 8px;
				padding: 9px 10px 8px;
				border-bottom: 1px solid rgba(255, 255, 255, 0.06);
			}

			.lb-panel-title {
				font-size: 10px;
				font-weight: 900;
				letter-spacing: .16em;
				text-transform: uppercase;
				color: #ffffff;
			}

			#lb-close {
				width: 24px;
				height: 24px;
				padding: 0;
				border: 1px solid rgba(255, 110, 110, 0.2);
				border-radius: 8px;
				background: rgba(255,255,255,0.05);
				color: rgba(255, 232, 232, 0.9);
				font: 900 14px/1 "Outfit", sans-serif;
				cursor: pointer;
				outline: none;
			}

			#lb-close:hover,
			#lb-close:focus-visible {
				background: rgba(255, 60, 60, 0.3);
				border-color: rgba(255, 99, 99, 0.38);
			}

			.lb-panel-body {
				padding: 9px 10px 10px;
				max-height: calc(min(60vh, 262px) - 42px);
				overflow-y: auto;
				scrollbar-width: none;
			}

			.lb-panel-body::-webkit-scrollbar {
				display: none;
			}

			#lb-list {
				display: grid;
				gap: 3px;
			}

			.lb-row {
				display: grid;
				grid-template-columns: 18px minmax(0, 1fr) auto;
				align-items: center;
				gap: 6px;
				min-height: 20px;
				padding: 1px 0;
				font-size: 11px;
				font-weight: 500;
				color: rgba(247, 248, 251, 0.9);
			}

			.lb-rank {
				color: rgba(247, 248, 251, 0.58);
				font-weight: 800;
			}

			.lb-rank.is-podium {
				color: #ffd74f;
			}

			.lb-name {
				min-width: 0;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
				font-weight: 500;
			}

			.lb-mass {
				color: #00e5ff;
				text-align: right;
				white-space: nowrap;
				font-weight: 800;
			}

			.lb-self-wrap {
				margin-top: 8px;
				padding-top: 8px;
				border-top: 1px solid rgba(255, 255, 255, 0.06);
			}

			.lb-row.is-self {
				margin: 0 -5px;
				padding: 6px 7px;
				border-radius: 0;
				background: rgba(255, 255, 255, 0.08);
			}

			#lb-empty {
				display: none;
				padding: 6px 0 2px;
				font-size: 11px;
				font-weight: 400;
				color: rgba(236, 242, 248, 0.62);
			}

			.lb-panel-foot {
				margin-top: 8px;
			}

			#lb-exit-btn {
				width: 100%;
				padding: 7px 9px;
				border: 1px solid rgba(255, 55, 55, 0.34);
				border-radius: 10px;
				background: rgba(12, 4, 6, 0.36);
				color: rgba(255, 232, 232, 0.92);
				font: 900 10px/1 "Outfit", sans-serif;
				letter-spacing: .08em;
				text-transform: uppercase;
				cursor: pointer;
				outline: none;
			}

			#lb-exit-btn:hover,
			#lb-exit-btn:focus-visible {
				background: rgba(70, 16, 22, 0.5);
				border-color: rgba(255, 88, 88, 0.5);
			}

			.game-flow-overlay {
				position: fixed;
				inset: 0;
				z-index: 260;
				display: none;
				align-items: center;
				justify-content: center;
				padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
				background: radial-gradient(circle at 50% 45%, rgba(0,229,255,0.13), transparent 36%), rgba(0, 0, 0, 0.78);
				color: #fff;
				font-family: "Outfit", "Segoe UI", Tahoma, sans-serif;
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
			}

			.game-flow-overlay.is-open {
				display: flex;
			}

			.game-flow-card {
				width: min(640px, calc(100vw - 36px));
				padding: 24px;
				border: 1px solid rgba(255,255,255,0.09);
				border-radius: 24px;
				background: rgba(7, 8, 12, 0.98);
				box-shadow: 0 24px 70px rgba(0,0,0,0.62), inset 0 1px 0 rgba(255,255,255,0.08);
				text-align: center;
			}

			.game-flow-result-layout {
				display: grid;
				grid-template-columns: minmax(190px, .9fr) minmax(240px, 1.1fr);
				gap: 16px;
				align-items: stretch;
				margin-bottom: 18px;
			}

			.game-flow-result-profile,
			.game-flow-result-summary {
				border: 1px solid rgba(255,255,255,0.07);
				border-radius: 20px;
				background: rgba(255,255,255,0.035);
				padding: 16px;
			}

			.game-flow-skin-ring {
				width: 92px;
				height: 92px;
				margin: 0 auto 14px;
				border: 2px solid #00e5ff;
				border-radius: 50%;
				background: #000;
				box-shadow: 0 0 24px rgba(0,229,255,0.28);
				overflow: hidden;
			}

			.game-flow-skin-ring img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				display: block;
			}

			.game-flow-level-line {
				display: flex;
				justify-content: space-between;
				gap: 12px;
				margin: 0 0 7px;
				color: rgba(255,255,255,0.62);
				font-size: 10px;
				font-weight: 800;
				letter-spacing: .08em;
				text-transform: uppercase;
			}

			.game-flow-xp-bar {
				width: 100%;
				height: 7px;
				border-radius: 999px;
				background: rgba(255,255,255,0.08);
				overflow: hidden;
			}

			.game-flow-xp-bar div {
				height: 100%;
				border-radius: inherit;
				background: linear-gradient(90deg, #00e5ff, #39ff14);
			}

			.game-flow-result-title {
				margin: 0 0 8px;
				color: rgba(255,255,255,0.68);
				font-size: 10px;
				font-weight: 900;
				letter-spacing: .18em;
				text-align: left;
				text-transform: uppercase;
			}

			.game-flow-rewards {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 8px;
				margin: 0 0 14px;
			}

			.game-flow-rewards div {
				padding: 10px 8px;
				border: 1px solid rgba(0,229,255,0.14);
				border-radius: 14px;
				background: rgba(0,229,255,0.055);
			}

			.game-flow-rewards span,
			.game-flow-stat span {
				display: block;
				margin-bottom: 3px;
				color: rgba(255,255,255,0.52);
				font-size: 9px;
				font-weight: 900;
				letter-spacing: .12em;
				text-transform: uppercase;
			}

			.game-flow-rewards strong {
				color: #00e5ff;
				font-size: 18px;
				font-weight: 900;
			}

			.game-flow-kicker {
				margin-bottom: 8px;
				color: #00e5ff;
				font-size: 11px;
				font-weight: 900;
				letter-spacing: 0.22em;
				text-transform: uppercase;
			}

			.game-flow-card h2 {
				margin: 0 0 10px;
				color: #fff;
				font-size: 28px;
				font-weight: 900;
				letter-spacing: 0.08em;
				text-transform: uppercase;
			}

			.game-flow-card p {
				margin: 0 0 18px;
				color: rgba(255,255,255,0.68);
				font-size: 14px;
				line-height: 1.35;
			}

			.game-flow-stats {
				display: grid;
				grid-template-columns: repeat(2, 1fr);
				gap: 8px;
				margin: 0;
			}

			.game-flow-stat {
				padding: 10px 8px;
				border: 1px solid rgba(255,255,255,0.07);
				border-radius: 14px;
				background: rgba(255,255,255,0.045);
			}

			.game-flow-stat span {
				display: block;
				color: rgba(255,255,255,0.45);
				font-size: 10px;
				font-weight: 800;
				letter-spacing: 0.12em;
				text-transform: uppercase;
			}

			.game-flow-stat strong {
				display: block;
				margin-top: 4px;
				color: #fff;
				font-size: 16px;
				font-weight: 900;
			}

			.game-flow-actions {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 10px;
			}

			.game-flow-btn {
				min-height: 44px;
				border: 1px solid rgba(255,255,255,0.1);
				border-radius: 14px;
				background: rgba(255,255,255,0.06);
				color: #fff;
				font: 900 12px/1 "Outfit", sans-serif;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				cursor: pointer;
			}

			.game-flow-btn.primary {
				border-color: rgba(0,229,255,0.42);
				background: linear-gradient(135deg, rgba(0,229,255,0.92), rgba(148,0,211,0.78));
				color: #061014;
				box-shadow: 0 0 24px rgba(0,229,255,0.25);
			}

			.game-flow-btn.danger {
				border-color: rgba(255,75,75,0.42);
				background: rgba(85, 14, 20, 0.76);
				color: #ffe7e7;
			}

			#title {
				padding: 10px;
			}

			#nick {
				width: 65%;
			}

			#skin {
				width: 33%;
				float: right;
			}

			#gallery-btn {
				width: 100%;
				margin-bottom: 5px;
				display: none; /* Visible when skins are loaded */
			}

			#settings {
				max-height: min(48vh, 360px);
				overflow-y: auto;
				padding-right: 2px;
			}

			.settings-grid {
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 8px 12px;
			}

			.settings-grid label {
				display: flex;
				align-items: center;
				gap: 6px;
				margin: 0;
				min-width: 0;
			}

			.settings-audio {
				margin-top: 12px;
				padding-top: 12px;
				border-top: 1px solid rgba(15, 23, 42, 0.08);
				display: grid;
				gap: 10px;
			}

			.settings-heading {
				font-size: 11px;
				font-weight: 700;
				letter-spacing: .08em;
				text-transform: uppercase;
				color: #5b6f89;
			}

			.audio-row {
				display: grid;
				grid-template-columns: minmax(0, 1fr) 96px 46px;
				gap: 8px;
				align-items: center;
			}

			.audio-toggle {
				display: flex;
				align-items: center;
				gap: 6px;
				margin: 0;
				min-width: 0;
			}

			.audio-slider {
				width: 100%;
				margin: 0;
			}

			.audio-value {
				font-size: 12px;
				text-align: right;
				color: #5b6f89;
			}

			.audio-row.is-disabled {
				opacity: .55;
			}

			#footer {
				text-align: center;
				margin-bottom: 10px;
				margin-top: -10px;
			}

			#a300x250 {
				width: 300px;
				height: 250px;
				background-repeat: no-repeat;
				background-size: contain;
				background-position: center center
			}

			.ui-dialog {
				background-color: #141414;
				/*background-image: url(http://agariohub.tk/assets/img/texture.png);*/
				z-index: 100000
			}

			.ui-widget-overlay {
				overflow: hidden;
				z-index: 1000000
			}

			.skinclick {
				cursor: pointer;
				padding: 2px;
				position: relative;
				right: -12px;
				border-radius: 50%;
				-webkit-transition: all .5s ease;
				-moz-transition: all .5s ease;
				-ms-transition: all .5s ease;
				-o-transition: all .5s ease;
				transition: all .5s ease;
				border: 1px solid orange
			}

			.skinlist:hover {
				cursor: pointer;
			}

			.skinclick:hover {
				border: 1px solid #fff;
				z-index: 99999999999999;
				-webkit-transform: scale(2.25);
				-moz-transform: scale(2.25);
				-ms-transform: scale(2.25);
				-o-transform: scale(2.25);
				transform: scale(2.25)
			}

			hr.top {
				margin-top: 5px;
			}

			h2 {
				margin-top: 0;
				margin-bottom: 0;
			}

			.grecaptcha-badge {
				display: none;
			}

			@media (max-width: 640px) {
				#canvas {
					width: var(--blobz-game-width, 100vw);
					height: var(--blobz-game-height, 100vh);
				}

				#chat_textbox {
					display: none !important;
				}

				#helloDialog {
					width: min(92vw, 350px);
					padding: 8px 12px 10px;
				}

				#nick, #skin {
					width: 100%;
					float: none;
					display: block !important;
				}

				#skin {
					margin-top: 8px;
				}

				.btn-play {
					width: calc(100% - 58px);

				<div class="text-center" style="display: block; color: #3b6ea8;">Launching your local arena session</div>

			</div>
		</div>

		<canvas height="600" id="canvas" width="800"></canvas>
		<div id="game-stats-strip" aria-live="off">

		</div>
		<div id="lb-hud" class="is-hidden">
			<button id="lb-toggle" type="button" aria-label="Open leaderboard" aria-expanded="false" aria-controls="lb-panel">
				<span class="lb-trigger-icon" aria-hidden="true">&#127942;</span>
			</button>
			<div id="lb-panel" aria-label="Leaderboard panel">
				<div class="lb-panel-head">
					<div class="lb-panel-title">Leaderboard</div>
					<button id="lb-close" type="button" aria-label="Close leaderboard">&times;</button>
				</div>
				<div class="lb-panel-body">
					<div id="lb-list"></div>
					<div id="lb-self" class="lb-self-wrap" style="display:none;"></div>
					<div id="lb-empty">Waiting for players...</div>
					<div class="lb-panel-foot">
						<button id="lb-exit-btn" type="button">&times; Exit Game</button>
					</div>
				</div>
			</div>
		</div>

		<div id="game-flow-overlay" class="game-flow-overlay" aria-hidden="true">
			<div id="game-flow-card" class="game-flow-card" role="dialog" aria-modal="true"></div>
		</div>
