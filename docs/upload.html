<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Blobz - Custom Skin Upload</title>
		<link rel="icon" type="image/png" href="img/blobz-mark.png" />
		<style>
			:root {
				--bg: #eef6ff;
				--fg: #1c2a40;
				--muted: #5e7493;
				--line: rgba(50, 86, 130, 0.12);
				--card: rgba(255, 255, 255, 0.94);
				--shadow: 0 16px 36px rgba(16, 42, 78, 0.14);
				--cta: #2d6cdf;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 24px;
				font-family: "Segoe UI", Arial, sans-serif;
				color: var(--fg);
				background:
					linear-gradient(var(--line) 1px, transparent 1px),
					linear-gradient(90deg, var(--line) 1px, transparent 1px),
					linear-gradient(180deg, #f9fbff, var(--bg));
				background-size: 48px 48px, 48px 48px, 100% 100%;
			}

			.card {
				max-width: 560px;
				padding: 34px;
				border-radius: 28px;
				background: var(--card);
				box-shadow: var(--shadow);
				text-align: center;
			}

			img {
				width: 72px;
				height: 72px;
				margin-bottom: 14px;
			}

			h1 {
				margin: 0 0 10px;
				font-size: 34px;
			}

			p {
				margin: 0 0 16px;
				font-size: 16px;
				line-height: 1.55;
				color: var(--muted);
			}

			a {
				display: inline-block;
				margin-top: 6px;
				padding: 12px 18px;
				border-radius: 999px;
				background: var(--cta);
				color: #fff;
				text-decoration: none;
				font-weight: 700;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<img src="img/blobz-mark.png" alt="Blobz mark" />
			<h1>Custom Skin Upload</h1>
			<p>The old upstream upload flow has been retired during the Blobz rebrand.</p>
			<p>For now, use the built-in Blobz skin gallery from the main lobby. We can add a first-party Blobz upload flow later without changing gameplay.</p>
			<a href="./">Return To Blobz</a>
		</div>
	</body>
</html>
