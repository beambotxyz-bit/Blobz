<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Blobz | Page Not Found</title>
		<link rel="icon" type="image/png" href="img/blobz-mark.png" />
		<style>
			:root {
				color-scheme: light;
				--bg: #eef6ff;
				--fg: #1c2a40;
				--muted: #567192;
				--line: rgba(48, 92, 145, 0.12);
				--card: rgba(255, 255, 255, 0.92);
				--shadow: 0 18px 40px rgba(23, 48, 79, 0.12);
				--cta: #2d6cdf;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				font-family: "Segoe UI", Arial, sans-serif;
				color: var(--fg);
				background:
					linear-gradient(var(--line) 1px, transparent 1px),
					linear-gradient(90deg, var(--line) 1px, transparent 1px),
					linear-gradient(180deg, #f8fbff, var(--bg));
				background-size: 48px 48px, 48px 48px, 100% 100%;
				padding: 24px;
			}

			.card {
				max-width: 560px;
				padding: 36px 34px;
				border-radius: 28px;
				background: var(--card);
				box-shadow: var(--shadow);
				text-align: center;
			}

			img {
				width: 72px;
				height: 72px;
				margin-bottom: 16px;
			}

			h1 {
				margin: 0 0 12px;
				font-size: 40px;
			}

			p {
				margin: 0 0 22px;
				color: var(--muted);
				font-size: 17px;
				line-height: 1.5;
			}

			a {
				display: inline-block;
				padding: 12px 18px;
				border-radius: 999px;
				background: var(--cta);
				color: #fff;
				text-decoration: none;
				font-weight: 700;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<img src="img/blobz-mark.png" alt="Blobz mark" />
			<h1>404</h1>
			<p>The page you asked for is not in this Blobz build. Head back to the arena lobby and keep moving.</p>
			<a href="./">Return To Blobz</a>
		</div>
	</body>
</html>
