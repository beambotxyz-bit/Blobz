<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' data:; img-src 'self' data: *; media-src 'self' data: *; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com; font-src 'self' fonts.gstatic.com cdnjs.cloudflare.com data:; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://telegram.org; connect-src 'self' http://127.0.0.1:8787 http://localhost:8787 ws: wss:; manifest-src 'self'; frame-src 'self' data:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Blobz</title>
<link rel="shortcut icon" href="/img/blobz-mark.png">
<link rel="icon" type="image/png" href="/img/blobz-mark.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/blobstars-lobby.css?v=15">
    <link rel="stylesheet" href="/css/blobstars-lobby-integration.css?v=15">
</head>
<body class="blobz-lobby-page">
<div class="bg-layer"></div>
    <div class="nebula-cloud"></div>
    <div class="hyperspace" id="hyperspaceBg" aria-hidden="true"></div>
    <div class="nebula-glow"></div>
    <div class="bg-grid"></div>
    <div class="smoke-clouds"></div>
    <div class="void-cells" aria-hidden="true">
        <span class="cell ghost drift-b" style="--cell-x:4%; --cell-y:11%; --cell-size:22px; --cell-fill:rgba(168,84,255,0.26); --cell-alpha:0.38; --cell-alpha-hi:0.5; --cell-blur:3px; --duration:28s; --pulse:13s;"></span>
        <span class="cell ghost drift-c" style="--cell-x:24%; --cell-y:6%; --cell-size:54px; --cell-fill:rgba(160,72,255,0.14); --cell-alpha:0.18; --cell-alpha-hi:0.26; --cell-blur:4px; --duration:31s; --pulse:16s; --delay:-7s;"></span>
        <span class="cell ghost drift-a" style="--cell-x:24%; --cell-y:22%; --cell-size:30px; --cell-fill:rgba(76,112,255,0.2); --cell-alpha:0.24; --cell-alpha-hi:0.32; --cell-blur:2px; --duration:26s; --pulse:12s; --delay:-4s;"></span>
        <span class="cell drift-b mobile-hide" style="--cell-x:73%; --cell-y:10%; --cell-size:44px; --cell-fill:rgba(239,58,198,0.96); --cell-hi:rgba(255,190,235,0.72); --cell-ring:rgba(100,12,85,0.9); --cell-glow:rgba(239,58,198,0.24); --cell-alpha:0.94; --cell-alpha-hi:1; --duration:25s; --pulse:10s;"></span>
        <span class="cell drift-c" style="--cell-x:96%; --cell-y:16%; --cell-size:48px; --cell-fill:rgba(43,122,255,0.92); --cell-hi:rgba(176,213,255,0.7); --cell-ring:rgba(8,49,122,0.9); --cell-glow:rgba(43,122,255,0.22); --cell-alpha:0.92; --cell-alpha-hi:1; --duration:24s; --pulse:11s; --delay:-8s;"></span>
        <span class="cell drift-a" style="--cell-x:95%; --cell-y:29%; --cell-size:36px; --cell-fill:rgba(255,163,41,0.96); --cell-hi:rgba(255,228,165,0.76); --cell-ring:rgba(128,64,0,0.9); --cell-glow:rgba(255,163,41,0.25); --cell-alpha:0.94; --cell-alpha-hi:1; --duration:20s; --pulse:9s; --delay:-6s;"></span>
        <span class="cell drift-c" style="--cell-x:17%; --cell-y:50%; --cell-size:34px; --cell-fill:rgba(240,60,205,0.94); --cell-hi:rgba(255,180,237,0.76); --cell-ring:rgba(123,13,103,0.88); --cell-glow:rgba(240,60,205,0.22); --cell-alpha:0.92; --cell-alpha-hi:1; --duration:23s; --pulse:10s; --delay:-3s;"></span>
        <span class="cell drift-b" style="--cell-x:42%; --cell-y:42%; --cell-size:38px; --cell-fill:rgba(53,201,228,0.94); --cell-hi:rgba(193,250,255,0.74); --cell-ring:rgba(12,89,102,0.9); --cell-glow:rgba(53,201,228,0.2); --cell-alpha:0.9; --cell-alpha-hi:0.98; --duration:21s; --pulse:9s; --delay:-5s;"></span>
        <span class="cell drift-a" style="--cell-x:58%; --cell-y:43%; --cell-size:33px; --cell-fill:rgba(222,48,234,0.92); --cell-hi:rgba(255,178,250,0.74); --cell-ring:rgba(111,10,118,0.88); --cell-glow:rgba(222,48,234,0.2); --cell-alpha:0.9; --cell-alpha-hi:0.98; --duration:24s; --pulse:10s; --delay:-10s;"></span>
        <span class="cell drift-c" style="--cell-x:74%; --cell-y:40%; --cell-size:20px; --cell-fill:rgba(168,70,255,0.9); --cell-hi:rgba(233,196,255,0.7); --cell-ring:rgba(87,18,126,0.9); --cell-glow:rgba(168,70,255,0.18); --cell-alpha:0.88; --cell-alpha-hi:0.95; --duration:20s; --pulse:8s; --delay:-1s;"></span>
        <span class="cell ghost drift-b" style="--cell-x:44%; --cell-y:59%; --cell-size:28px; --cell-fill:rgba(95,192,233,0.18); --cell-alpha:0.22; --cell-alpha-hi:0.3; --cell-blur:2px; --duration:27s; --pulse:13s; --delay:-9s;"></span>
        <span class="cell drift-a" style="--cell-x:3%; --cell-y:68%; --cell-size:34px; --cell-fill:rgba(238,64,221,0.94); --cell-hi:rgba(255,191,241,0.76); --cell-ring:rgba(118,14,109,0.9); --cell-glow:rgba(238,64,221,0.2); --cell-alpha:0.9; --cell-alpha-hi:0.98; --duration:22s; --pulse:9s; --delay:-12s;"></span>
        <span class="cell ghost drift-c" style="--cell-x:96%; --cell-y:78%; --cell-size:64px; --cell-fill:rgba(109,208,255,0.16); --cell-alpha:0.18; --cell-alpha-hi:0.24; --cell-blur:4px; --duration:30s; --pulse:15s; --delay:-6s;"></span>
    </div>
    <div class="brawler-vignette"></div>
    
    <div class="lobby">
        <div class="logo">BLOBSTARS</div>
        <div class="top-row">
            <div class="profile-pill" id="profileTrigger" onclick="openModal('profile')">
                <div class="avatar"><img id="profileAvatar" src="/skins/Base.png" alt="Current skin preview"></div>
                <div class="info">
                    <div class="name-row">
                        <span class="name" id="profileName">BITGRAF</span>
                        <span class="level" id="profileTag">LVL 42</span>
                    </div>
                    <div class="xp-text">3 240 / 6 400 XP</div>
                    <div class="xp-bar-bg">
                        <div class="xp-bar-fill" id="profileProgressBar"></div>
                    </div>
                </div>
            </div>
            
            <div class="currency-hub">
                <div class="gem-pill" onclick="openModal('market')">
                    <i class="fa-solid fa-gem gem-icon"></i>
                    <span id="gem-amount">42.4K</span>
                    <div class="gem-plus"><i class="fa-solid fa-plus"></i></div>
                </div>
                <div class="icon-btn desktop-only-btn" onclick="openModal('settings')"><i class="fa-solid fa-sliders"></i></div>
                <div class="icon-btn mobile-menu-btn" onclick="openModal('settings')"><i class="fa-solid fa-bars"></i></div>
            </div>
        </div>
        
        <div class="center-stage">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                <div class="play-btn-wrap">
                    <div class="play-btn-glow"></div>
                    <button class="play-btn" id="launchTrigger" onclick="launchGame('play')"><i class="fa-solid fa-play"></i></button>
                </div>
            </div>
        </div>
        
        <div class="bottom-dock">
            <div class="nav-item" data-modal="inventory" onclick="openModal('inventory')"><i class="fa-solid fa-box-open" style="color: #00e5ff;"></i><span>ASSETS</span></div>
            <div class="nav-item" data-modal="market" onclick="openModal('market')"><i class="fa-solid fa-store" style="color: #ffaa00;"></i><span>MARKET</span></div>
            <div class="nav-item active nav-home" data-modal="home" onclick="closeModal()"><div class="dock-game-icon" aria-hidden="true"><i class="fa-solid fa-gamepad"></i></div><span>BLOBSTARS</span></div>
            <div class="nav-item" data-modal="ranking" onclick="openModal('ranking')"><i class="fa-solid fa-ranking-star" style="color: gold;"></i><span>LADDER</span></div>
            <div class="nav-item" data-modal="tasks" onclick="openModal('tasks')"><i class="fa-solid fa-clipboard-list" style="color: #39ff14;"></i><span>TASKS</span></div>
        </div>
        
        <div class="side-rail desktop-only">
            <div class="rail-item" onclick="openModal('daily')"><i class="fa-solid fa-gift"></i><div class="rail-badge">1</div></div>
        </div>
    </div>

    <!-- Universal Modal System -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card premium-panel">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">TITLE</h2>
                <div class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></div>
            </div>
            <div class="modal-content" id="modalContent">
                <!-- Content Injected -->
            </div>
        </div>
    </div>

    <!-- Central Dialogue Popup Modal -->
    <div class="modal-overlay" id="dialogueOverlay" style="z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);">
        <div id="dialogueCard" style="width: 100%; max-width: 320px; padding: 2.5rem 1.5rem 1.5rem; display: flex; flex-direction: column; align-items: center; position: relative; background: rgba(10, 10, 15, 0.95); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); transition: box-shadow 0.3s, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: scale(0.95); box-shadow: 0 15px 50px rgba(0,0,0,0.8);">
            <!-- Content injected via JS -->
        </div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/js/blobz-api.js?v=1"></script>
    <script src="/js/blobstars-lobby.js?v=16"></script>
</body>
</html>
